<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const INITIAL_REAL_WAGE = 1000;

// =========================================================
// 日付・localStorage ユーティリティ
// =========================================================
const getTodayStr = () => new Date().toISOString().split("T")[0];
const getNowHHMM = () => {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
};

const LS_KEY = "jikan_asset_v1";
const loadLS = () => {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; }
  catch { return null; }
};
const saveLS = (data) => {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
};

// アイコンはReactコンポーネントなのでシリアライズ不可。アクティビティ保存時は文字列に変換
const ICON_MAP = {
  BookOpen: BookOpen, Dumbbell: Dumbbell, Code: Code,
  Briefcase: Briefcase, PenTool: PenTool,
  Bath: Bath, Utensils: Utensils, Coffee: Coffee,
  Smartphone: Smartphone, Gamepad2: Gamepad2, Tv: Tv,
  Star: Star, Zap: Zap
};
const serializeActivities = (acts) =>
  Object.fromEntries(Object.entries(acts).map(([cat, list]) => [
    cat,
    list.map(a => ({ ...a, icon: typeof a.icon === "string" ? a.icon : Object.entries(ICON_MAP).find(([,v]) => v === a.icon)?.[0] || "Star" }))
  ]));
const deserializeActivities = (acts) =>
  Object.fromEntries(Object.entries(acts).map(([cat, list]) => [
    cat,
    list.map(a => ({ ...a, icon: ICON_MAP[a.icon] ?? a.icon }))
  ]));

const formatTime = (seconds) => {

  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

};

// =========================================================
// iOS-style Picker Column
// =========================================================
const IOSPickerColumn = ({ values, selectedValue, onChange, label }) => {
  const ITEM_H = 44;
  const VISIBLE = 5;
  const scrollRef = useRef(null);
  const snapTimerRef = useRef(null);
  const isUserScrolling = useRef(false);

  // 初期スクロール位置をセット（外部からの selectedValue 変更時はユーザー操作中でなければ追従）
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const idx = values.indexOf(selectedValue);
    if (idx < 0) return;
    if (!isUserScrolling.current) {
      el.scrollTop = idx * ITEM_H;
    }
  }, [selectedValue, values]);

  const snapToNearest = () => {
    const el = scrollRef.current;
    if (!el) return;
    const rawIdx = el.scrollTop / ITEM_H;
    const idx = Math.round(rawIdx);
    const clamped = Math.max(0, Math.min(values.length - 1, idx));
    el.scrollTop = clamped * ITEM_H;
    isUserScrolling.current = false;
    if (values[clamped] !== selectedValue) {
      onChange(values[clamped]);
    }
  };

  const handleScroll = () => {
    isUserScrolling.current = true;
    if (snapTimerRef.current) clearTimeout(snapTimerRef.current);
    snapTimerRef.current = setTimeout(snapToNearest, 100);
  };

  return (
    <div className="flex flex-col items-center gap-2 flex-1">
      <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">{label}</span>
      <div
        className="relative rounded-2xl overflow-hidden bg-zinc-900"
        style={{ height: ITEM_H * VISIBLE, width: "100%" }}
      >
        {/* 選択バンド */}
        <div
          className="absolute left-3 right-3 pointer-events-none z-10 rounded-xl"
          style={{
            top: ITEM_H * 2,
            height: ITEM_H,
            background: "rgba(255,255,255,0.07)",
            borderTop: "1px solid rgba(255,255,255,0.12)",
            borderBottom: "1px solid rgba(255,255,255,0.12)",
          }}
        />
        {/* 上フェード */}
        <div
          className="absolute top-0 left-0 right-0 pointer-events-none z-20"
          style={{
            height: ITEM_H * 2,
            background: "linear-gradient(to bottom, rgb(9,9,11) 0%, rgba(9,9,11,0) 100%)",
          }}
        />
        {/* 下フェード */}
        <div
          className="absolute bottom-0 left-0 right-0 pointer-events-none z-20"
          style={{
            height: ITEM_H * 2,
            background: "linear-gradient(to top, rgb(9,9,11) 0%, rgba(9,9,11,0) 100%)",
          }}
        />
        {/* スクロール本体 */}
        <div
          ref={scrollRef}
          onScroll={handleScroll}
          className="h-full overflow-y-scroll scrollbar-hide"
          style={{
            paddingTop: ITEM_H * 2,
            paddingBottom: ITEM_H * 2,
            scrollSnapType: "y mandatory",
            WebkitOverflowScrolling: "touch",
          }}
        >
          {values.map((v, i) => {
            const isSelected = v === selectedValue;
            return (
              <div
                key={i}
                style={{ height: ITEM_H, scrollSnapAlign: "center" }}
                className={`flex items-center justify-center font-mono select-none transition-all duration-150 ${
                  isSelected
                    ? "text-white text-2xl font-black"
                    : "text-zinc-600 text-lg font-semibold"
                }`}
              >
                {String(v).padStart(2, "0")}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const SwipeToDelete = ({ children, onDelete, disabled, style }) => {
  const startX = useRef(null);
  const [offsetX, setOffsetX] = useState(0);
  const THRESHOLD = 72;

  const onTouchStart = (e) => {
    if (disabled) return;
    startX.current = e.touches[0].clientX;
  };
  const onTouchMove = (e) => {
    if (startX.current === null || disabled) return;
    const dx = e.touches[0].clientX - startX.current;
    if (dx < 0) { e.stopPropagation(); setOffsetX(Math.max(dx, -THRESHOLD - 20)); }
  };
  const onTouchEnd = () => {
    if (disabled) return;
    if (offsetX <= -THRESHOLD) { setTimeout(onDelete, 180); }
    else setOffsetX(0);
    startX.current = null;
  };

  return (
    <div style={{ ...style, overflow: "hidden" }}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      {/* 削除背景（右端） */}
      <div className="absolute inset-0 flex items-center justify-end pr-4 rounded-xl z-10"
        style={{ background: "#ef4444", opacity: offsetX < -8 ? 1 : 0, transition: "opacity 0.15s" }}>
        <Trash2 size={18} className="text-white" />
      </div>
      {/* コンテンツ */}
      <div style={{ transform: `translateX(${offsetX}px)`, transition: startX.current ? "none" : "transform 0.2s ease", position: "relative", zIndex: 20 }}>
        {children}
      </div>
    </div>
  );
};

// =========================================================
// 起動時／復帰時オフライン差分を同期計算
// =========================================================
const computeOfflineDelta = (saved) => {
  const base = {
    categoryTimes: saved?.categoryTimes ?? { investment: 0, labor: 0, recovery: 0, waste: 0, reward_time: 0 },
    receiptHistory: saved?.receiptHistory ?? {},
    laborAssets: saved?.laborAssets ?? 0,
    needsMorning: false,
    offlineNotice: null,
  };
  if (!saved?.lastSeenAt) return base;

  const lastSeen = new Date(saved.lastSeenAt);
  const now = new Date();
  const diffSeconds = Math.floor((now - lastSeen) / 1000);
  if (diffSeconds <= 5) return base;

  // リセット時刻をまたいでいるか判定
  const [rh, rm] = (saved.resetTime ?? "03:00").split(":").map(Number);
  const resetToday = new Date(now); resetToday.setHours(rh, rm, 0, 0);
  const latestReset = resetToday > now
    ? new Date(resetToday.getTime() - 86400000)
    : resetToday;

  if (lastSeen < latestReset) {
    return { ...base, needsMorning: true };
  }

  // またいでいない & activeCategory がある → 差分を加算
  const cat = saved.activeCategory;
  if (!cat) return base;

  const todayStr = getTodayStr();
  const nextTimes = { ...base.categoryTimes, [cat]: (base.categoryTimes[cat] || 0) + diffSeconds };
  const nextHistory = { ...base.receiptHistory, [todayStr]: nextTimes };
  const nextLabor = cat === "labor"
    ? base.laborAssets + (saved.realWage ?? INITIAL_REAL_WAGE) * diffSeconds / 3600
    : base.laborAssets;

  const fmtDiff = diffSeconds >= 3600
    ? `${Math.floor(diffSeconds / 3600)}時間${Math.floor((diffSeconds % 3600) / 60)}分`
    : `${Math.floor(diffSeconds / 60)}分`;
  const catLabel = { investment: "投資", labor: "労働", recovery: "回復", waste: "浪費" }[cat] ?? cat;

  return {
    categoryTimes: nextTimes,
    receiptHistory: nextHistory,
    laborAssets: nextLabor,
    needsMorning: false,
    offlineNotice: `📲 オフライン中の${fmtDiff}を「${catLabel}」に加算しました。`,
  };
};

  useEffect(() => {

  // ホームの活動をリアルタイムでスケジュールに反映するref
  const liveBlockRef = useRef(null); // { id, category, activityId, activityName, date, startHHMM }

  useEffect(() => {
    const intervalId = setInterval(() => {
      if (activeCategory) {
        const todayStr = getTodayStr();

        // リアルタイムスケジュール反映

          const allActs = Object.values(DEFAULT_ACTIVITIES).flat();

              const newBlock = {

      } else {
        // 活動停止時：liveブロックをクリア

          setScheduleBlocks(prev => prev.filter(b => !b.isLive));
          liveBlockRef.current = null;
        }
      }
      if (activeCategory === "investment") {
        // 慣性ボーナス更新
        setMomentumSeconds(prev => {
          const next = prev + 1;
          // 節目通知
          if (next === 25 * 60) setTimeout(() => setNotification("⚡ 慣性ボーナス 1.1倍！25分連続投資達成！"), 0);
          if (next === 55 * 60) setTimeout(() => setNotification("🔥 慣性ボーナス 1.2倍！55分連続投資達成！"), 0);
          if (next === 90 * 60) setTimeout(() => setNotification("💥 慣性ボーナス 1.5倍！90分連続投資！超集中モード！"), 0);
          if (next === 120 * 60) setTimeout(() => setNotification("🌟 慣性ボーナス MAX 2.0倍！伝説の領域に突入！"), 0);
          return next;
        });
        if (recoveryGraceRef.current) { clearTimeout(recoveryGraceRef.current); recoveryGraceRef.current = null; }
        // 連続投資日数更新
        const todayDateStr = getTodayStr();
        setLastInvestDate(prev => {
          if (prev !== todayDateStr) {
            setInvestStreak(s => {
              const next = s + 1;
              TITLE_MILESTONES.forEach(m => {
                if (m.streakThreshold && next >= m.streakThreshold) {
                  setUnlockedTitles(prev2 => prev2.includes(m.id) ? prev2 : [...prev2, m.id]);

              });
              return next;
            });
            return todayDateStr;

          return prev;

        const getMomentumMult = (sec) => {

          if (sec >= 55 * 60) return 1.2;
          if (sec >= 25 * 60) return 1.1;

  // lastSeenAt の管理 ＆ バックグラウンド復帰時のオフライン差分加算。

  useEffect(() => {

    const startTicking = () => {
      if (intervalId) return;
      tick();
      intervalId = setInterval(tick, 1000);
    };
    const stopTicking = () => {
      if (intervalId) { clearInterval(intervalId); intervalId = null; }
    };

    const handleVisibilityChange = () => {
      if (document.visibilityState === "hidden") {
        // 非表示になった瞬間に時刻を固定し、更新を止める
        tick();
        stopTicking();
      } else {
        // 復帰：固定しておいた lastSeenAt からの差分を加算
        const saved = loadLS();
        const result = computeOfflineDelta(saved);
        if (result.needsMorning) {
          setMorningModal({ isOpen: true, bedTime: "00:00", wakeTime: "07:00", gapCategory: "recovery" });
        } else {
          setCategoryTimes(result.categoryTimes);
          setReceiptHistory(result.receiptHistory);
          setLaborAssets(result.laborAssets);
          if (result.offlineNotice) setNotification(result.offlineNotice);
        }
        // 加算済みなので時刻をリセットしてから再び計測開始
        if (saved) saveLS({ ...saved, lastSeenAt: Date.now() });
        startTicking();
      }
    };

    startTicking();
    document.addEventListener("visibilitychange", handleVisibilityChange);
    window.addEventListener("pagehide", tick);
    return () => {
      stopTicking();

      window.removeEventListener("pagehide", tick);
    };

  // 日中は感度を高め（数分で見える動き）、終値は翌朝に確定
  const liveSentiment = (() => {

  // 表示する市場価値 = 実力(基礎価値) × ライブ市場評価S
  const marketValue = potentialWage * liveSentiment;

  // リセット時刻からの経過分（今日のザラ場の横軸）
  const minsSinceReset = () => {
    const [rh, rm] = (resetTime || "03:00").split(":").map(Number);
    const now = new Date();
    const reset = new Date(now); reset.setHours(rh, rm, 0, 0);
    if (reset > now) reset.setDate(reset.getDate() - 1);

  const mvRef = useRef(marketValue); mvRef.current = marketValue;

  useEffect(() => {

        if (cur !== target) { dispRef.current = target; setAnimTick(t => t + 1); }

      dispRef.current = cur + diff * 0.18;
      setAnimTick(t => t + 1);
    }, 33);
    return () => clearInterval(id);
  }, []);

        }
        return [...tr, { m, v: Math.round(mvRef.current) }];
      });

    sample();
    const id = setInterval(sample, 15000);
    return () => clearInterval(id);

  // レポート用：確定値のみ（朝の精算で記録された日次の市場価値）
  const wageSeries = useMemo(() =>
    Object.entries(wageHistory).sort(([a], [b]) => a.localeCompare(b)).map(([d, v]) => ({ d, v })),
    [wageHistory]);
  const [wageIdx, setWageIdx] = useState(null);

  // =========================================================
  // モーニングレシート確定処理
  // =========================================================
  const handleMorningConfirm = () => {
    const { bedTime, wakeTime, gapCategory } = morningModal;
    const saved = loadLS();
    if (!saved) { setMorningModal(prev => ({ ...prev, isOpen: false })); return; }

    const now = new Date();
    const lastSeen = new Date(saved.lastSeenAt);
    const [bh, bm] = bedTime.split(":").map(Number);
    const [wh, wm] = wakeTime.split(":").map(Number);

    // 就寝時刻（Date）
    const bedDate = new Date(now); bedDate.setHours(bh, bm, 0, 0);
    if (bedDate > now) bedDate.setDate(bedDate.getDate() - 1);

    // 起床時刻（Date）
    const wakeDate = new Date(now); wakeDate.setHours(wh, wm, 0, 0);
    if (wakeDate > now) wakeDate.setDate(wakeDate.getDate() - 1);

    // ① アプリを閉じた時刻 → 就寝時刻：閉じた時のカテゴリに加算（前日分）
    const gapToSleepSec = Math.max(0, Math.floor((bedDate - lastSeen) / 1000));
    // ② 就寝 → 起床：回復（睡眠）に加算（前日分）
    const sleepSec = Math.max(0, Math.floor((wakeDate - bedDate) / 1000));
    // ③ 起床 → アプリ起動：選択カテゴリに加算（今日分）
    const gapFromWakeSec = Math.max(0, Math.floor((now - wakeDate) / 1000));

    // 前日の receiptHistory に加算
    const yestStr = new Date(now.getTime() - 86400000).toISOString().split("T")[0];
    setReceiptHistory(h => {
      const prev = h[yestStr] || { investment: 0, labor: 0, recovery: 0, waste: 0 };
      const prevCat = saved.activeCategory ?? "waste";
      return {
        ...h,
        [yestStr]: {
          ...prev,
          [prevCat]: (prev[prevCat] || 0) + gapToSleepSec,
          recovery: (prev.recovery || 0) + sleepSec,
        },
        [getTodayStr()]: {
          ...(h[getTodayStr()] || { investment: 0, labor: 0, recovery: 0, waste: 0 }),
          [gapCategory]: ((h[getTodayStr()]?.[gapCategory]) || 0) + gapFromWakeSec,
        },
      };
    });

    // ===== 市場評価S（2層モデル）の日次更新 =====
    const yData = receiptHistory[yestStr] || { investment: 0, waste: 0 };
    const yInvestH = (yData.investment || 0) / 3600;
    const yWasteH = (yData.waste || 0) / 3600;
    const yInvesting = yInvestH > 0;
    const sStreak = yInvesting ? 0 : sabotageStreak + 1;
    // 前日の終値（その日ライブで表示していた値と一致）
    const yCloseS = Math.max(0.70, Math.min(1.30, sentiment + Math.max(-0.20, Math.min(0.20, yInvestH * 0.10 - yWasteH * 0.09))));
    // 翌日の寄り付き（終値から、規律・モメンタム・平均回帰で一晩かけて調整）
    let sDelta = 0;
    if (yWasteH > yInvestH) sDelta -= 0.02;                  // だらけた日は罰（規律補正C）
    else if (yInvesting && yWasteH === 0) sDelta += 0.04;    // 節制ボーナス（規律補正C）
    if (yInvesting) sDelta += Math.min(investStreak * 0.01, 0.06);                 // 上方モメンタム
    if (!yInvesting) { sDelta -= 0.03; if (sStreak >= 2) sDelta -= Math.min((sStreak - 1) * 0.02, 0.12); } // 下方モメンタム
    let newS = yCloseS + sDelta;
    newS += (1.0 - newS) * 0.20;                            // 平均回帰（終値→中立へ寄せる）
    newS = Math.max(0.70, Math.min(1.30, newS));
    setSentiment(newS);
    setSabotageStreak(sStreak);
    setIntradayTrack([]); // 新しい1日のザラ場をリセット
    // 前日の市場価値（実力 × その日の終値）を記録
    setWageHistory(h => ({ ...h, [yestStr]: Math.floor(potentialWage * yCloseS) }));

  const handleTimelineEmptyClick = (hour) => {

                    return (
                      <div className="bg-white rounded-2xl border border-gray-100 px-5 py-4 shadow-sm">

                        </div>
                      </div>
                    );
                  }
                  const n = rpts.length;
                  const vals = rpts.map(p => p.v);
                  const lo = Math.min(...vals), hi = Math.max(...vals);
                  const range = (hi - lo) || 1;
                  const xOf = (i) => (n <= 1 ? 0 : (i / (n - 1)) * 300);
                  const yOf = (v) => 82 - ((v - lo) / range) * 74;
                  const line = rpts.map((p, i) => `${i === 0 ? "M" : "L"}${xOf(i)},${yOf(p.v)}`).join(" ");

                  const idx = (wageIdx !== null && wageIdx < n) ? wageIdx : n - 1;
                  const shown = rpts[idx];
                  const scrub = (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const i = Math.round(((e.clientX - rect.left) / rect.width) * (n - 1));
                    setWageIdx(Math.max(0, Math.min(n - 1, i)));

                  <span className="text-[10px] text-gray-400 font-bold">/h</span>

                        <div key={todo.id} className="flex justify-between items-center text-xs px-2.5 py-1.5 rounded-xl border bg-gray-50 text-gray-600">
                          <span>{todo.text}</span>
                          <button onClick={() => setScheduleModal(prev => ({ ...prev, todos: prev.todos.filter(t => t.id !== todo.id) }))} className="text-red-500"><Trash2 size={12} /></button>
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <input type="text" id="sched-todo-input" placeholder="ToDoを追加..." onKeyDown={(e) => { if (e.key === "Enter") { handleAddScheduleTodo(e.target.value); e.target.value = ""; } }} className="flex-1 px-3 py-2 rounded-xl border border-gray-200 text-xs outline-none" />
                      <button onClick={() => { const el = document.getElementById("sched-todo-input"); if (el) { handleAddScheduleTodo(el.value); el.value = ""; } }} className={`px-3 rounded-xl text-xs font-bold text-white ${modalTheme.bg}`}>追加</button>
                    </div>
                  </div>
                )}
              </div>
              <div className="flex gap-2 mt-5 border-t border-gray-100 pt-4">
                {scheduleModal.id && (
                  <button onClick={handleDeleteSchedule} className={`px-3 rounded-xl transition-colors flex items-center justify-center gap-1 text-xs font-bold ${deleteConfirm ? "bg-red-500 text-white px-4" : "bg-red-50 text-red-500 hover:bg-red-100"}`}>
                    <Trash2 size={14} />{deleteConfirm ? "確認：削除" : ""}
                  </button>
                )}
                <button onClick={() => { setScheduleModal(prev => ({ ...prev, isOpen: false })); setDeleteConfirm(false); }} className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-600 font-bold text-sm hover:bg-gray-200">キャンセル</button>
                <button onClick={handleSaveSchedule} className={`flex-1 py-2.5 rounded-xl text-white font-bold text-sm ${modalTheme.bg} hover:opacity-90 shadow-sm`}>保存する</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* スケジュール重複アラート */}
      {activeOverlapAlert && (() => {
        const currentCatLabel = { investment: "投資", labor: "労働", recovery: "回復", waste: "浪費" }[activeCategory] ?? activeCategory;
        return (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
            <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl">
              <div className="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-500 mb-3 mx-auto"><Clock size={28} className="animate-spin-slow" /></div>
              <h3 className="font-bold text-base text-gray-800 text-center mb-1">予定されたブロックがあります</h3>
              <p className="text-xs text-gray-500 text-center mb-4 leading-relaxed">
                現在、{currentCatLabel}が記録されています。<br />
                <span className="font-bold text-gray-700">{activeOverlapAlert.startTime}〜現在</span>を、予定通り「<span className="font-bold text-gray-700">{activeOverlapAlert.activityName}</span>」として計測しますか？
              </p>
              <div className="flex flex-col gap-2">
                <button
                  onClick={() => {
                    const now = new Date();
                    const [sh, sm] = activeOverlapAlert.startTime.split(":").map(Number);
                    const blockStartMin = sh * 60 + sm;
                    const nowMin = now.getHours() * 60 + now.getMinutes();
                    const diffSec = Math.max(0, (nowMin - blockStartMin) * 60);
                    setCategoryTimes(prev => ({ ...prev, [activeOverlapAlert.category]: prev[activeOverlapAlert.category] + diffSec }));
                    setActiveCategory(activeOverlapAlert.category);
                    setActiveActivityId(activeOverlapAlert.activityId || null);
                    setAskedBlockIds(prev => new Set([...prev, activeOverlapAlert.id]));
                    setActiveOverlapAlert(null);
                  }}
                  className="w-full py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-xs shadow-md"
                >
                  はい、予定通り実行
                </button>
                <button
                  onClick={() => {
                    setScheduleBlocks(prev => prev.filter(b => b.id !== activeOverlapAlert.id));
                    setAskedBlockIds(prev => new Set([...prev, activeOverlapAlert.id]));
                    setActiveOverlapAlert(null);
                  }}
                  className="w-full py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-xs"
                >
                  いいえ、{currentCatLabel}を続ける（予定を削除）
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* オフラインブロック重複アラート */}
      {offlineBlockAlert && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
          <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl">
            <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 mb-3 mx-auto"><Check size={28} /></div>
            <h3 className="font-bold text-base text-gray-800 text-center mb-1">
              スケジュールが{offlineBlockAlert.count}件終了しました
            </h3>
            <p className="text-xs text-gray-500 text-center mb-4 leading-relaxed">
              スケジュールを確認・編集しますか？<br />
              <span className="text-gray-400">未記録の時間はカレンダーから追加できます。</span>
            </p>
            <div className="flex flex-col gap-2">
              <button
                onClick={() => {
                  setActiveTab("calendar");
                  setOfflineBlockAlert(null);
                }}
                className="w-full py-2.5 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-bold text-xs shadow-md"
              >
                カレンダーで確認する
              </button>
              <button
                onClick={() => setOfflineBlockAlert(null)}
                className="w-full py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-xs"
              >
                閉じる
              </button>
            </div>
          </div>
        </div>
      )}

      {/* アクティビティ追加モーダル */}
      {activityModal.isOpen && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={closeActivityModal}>
          <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl" onClick={stopPropagation}>
            <div className="flex justify-between items-center mb-4">
              <h3 className={`font-bold text-lg ${getCategoryTheme(activityModal.category).text}`}>アクティビティ追加</h3>
            </div>
            <div className="mb-4">
              <label className="block text-xs font-medium text-gray-500 mb-1.5">名前</label>
              <div className="flex items-center gap-3 px-3 py-2 rounded-xl border bg-gray-50">
                <ActivityIcon icon={newActivityIcon} size={20} />
                <input ref={modalInputRef} type="text" value={newActivityName} onChange={(e) => setNewActivityName(e.target.value)} className="bg-transparent outline-none text-sm w-full" />
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={closeActivityModal} className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-600 text-xs font-bold">キャンセル</button>
              <button onClick={handleSaveNewActivity} className="flex-1 py-2.5 rounded-xl bg-zinc-900 text-white text-xs font-bold">追加</button>
            </div>
          </div>
        </div>
      )}

      {/* アクティビティ管理モーダル */}
      {manageActivitiesModal.isOpen && (
        <div className="fixed inset-0 bg-black/50 z-50 flex flex-col justify-end backdrop-blur-sm" onClick={() => setManageActivitiesModal({ isOpen: false, category: "investment" })}>
          <div className="bg-white rounded-t-3xl w-full max-w-md mx-auto shadow-2xl max-h-[85vh] flex flex-col" onClick={stopPropagation}>
            <div className="px-5 pt-5 pb-3 border-b border-gray-100">
              <div className="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
              <div className="flex justify-between items-center">
                <h3 className="font-black text-base text-gray-800">アクティビティを管理</h3>
                <button onClick={() => setManageActivitiesModal({ isOpen: false, category: "investment" })} className="text-gray-400 hover:text-gray-600 p-1"><X size={20} /></button>
              </div>
              <div className="flex gap-1.5 mt-3 overflow-x-auto scrollbar-hide pb-1">
                {["investment","labor","recovery","waste"].map(cat => {
                  const th = getCategoryTheme(cat);
                  const isActive = manageActivitiesModal.category === cat;
                  return (
                    <button key={cat} onClick={() => setManageActivitiesModal(prev => ({ ...prev, category: cat }))} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all ${isActive ? `${th.bg} text-white shadow-sm` : "bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
                      {CATEGORY_LABELS[cat]}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto px-5 py-3 space-y-2 scrollbar-hide">
              {activities[manageActivitiesModal.category].map((act) => (
                <div key={act.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2.5 border border-gray-100">
                  <div className="flex items-center gap-3">
                    <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${getCategoryTheme(manageActivitiesModal.category).light}`}>
                      <ActivityIcon icon={act.icon} size={16} className={getCategoryTheme(manageActivitiesModal.category).text} />
                    </div>
                    <span className="text-sm font-bold text-gray-700">{act.name}</span>
                  </div>
                  <button onClick={() => {
                    if (activities[manageActivitiesModal.category].length <= 1) { setNotification("⚠️ 最低1つのアクティビティが必要です。"); return; }
                    setActivities(prev => ({ ...prev, [manageActivitiesModal.category]: prev[manageActivitiesModal.category].filter(a => a.id !== act.id) }));
                    setNotification(`🗑️ 「${act.name}」を削除しました。`);
                  }} className="p-1.5 text-gray-300 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50"><Trash2 size={14} /></button>
                </div>
              ))}
            </div>
            <div className="px-5 py-4 border-t border-gray-100">
              <button onClick={() => { setManageActivitiesModal({ isOpen: false, category: "investment" }); openActivityModal({ stopPropagation: () => {} }, manageActivitiesModal.category); }} className={`w-full py-3 rounded-2xl text-white text-sm font-black flex items-center justify-center gap-2 shadow-md ${getCategoryTheme(manageActivitiesModal.category).bg}`}>
                <Plus size={16} />{CATEGORY_LABELS[manageActivitiesModal.category]}に追加
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ご褒美ショップ アイテム追加・編集モーダル */}
      {shopItemModal.isOpen && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center backdrop-blur-sm">
          <div className="bg-white rounded-t-3xl w-full max-w-md p-5 shadow-2xl space-y-4">
            <div className="flex items-center justify-between">
              <h3 className="font-black text-sm text-gray-800">
                {shopItemModal.id ? "ご褒美を編集" : shopItemModal.type === "real" ? "🛍️ リアルご褒美を追加" : "⏱️ 時間ご褒美を追加"}
              </h3>
              <button onClick={() => setShopItemModal({ isOpen: false, ...EMPTY_SHOP_ITEM })} className="p-1.5 rounded-full hover:bg-gray-100 text-gray-400"><X size={18} /></button>
            </div>
            {!shopItemModal.id && (
              <div className="flex gap-2">
                <button onClick={() => setShopItemModal(prev => ({ ...prev, type: "real" }))} className={`flex-1 py-2 rounded-xl text-xs font-bold border transition-all ${shopItemModal.type === "real" ? "bg-emerald-500 text-white border-transparent" : "bg-gray-50 text-gray-500 border-gray-200"}`}>🛍️ モノ（円）</button>
                <button onClick={() => setShopItemModal(prev => ({ ...prev, type: "time" }))} className={`flex-1 py-2 rounded-xl text-xs font-bold border transition-all ${shopItemModal.type === "time" ? "bg-purple-500 text-white border-transparent" : "bg-gray-50 text-gray-500 border-gray-200"}`}>⏱️ 時間（倍率）</button>
              </div>
            )}
            <div className="flex gap-2 items-center">
              <select value={shopItemModal.icon} onChange={(e) => setShopItemModal(prev => ({ ...prev, icon: e.target.value }))} className="text-2xl bg-gray-50 border border-gray-200 rounded-xl px-2 py-2 appearance-none outline-none cursor-pointer w-16 text-center">
                {AVAILABLE_EMOJIS.map(e => <option key={e} value={e}>{e}</option>)}
              </select>
              <input type="text" placeholder="アイテム名（例：スタバ）" value={shopItemModal.name} onChange={(e) => setShopItemModal(prev => ({ ...prev, name: e.target.value }))} className="flex-1 px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-xs text-gray-800 font-bold" />
            </div>
            {shopItemModal.type === "real" ? (
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-gray-500 w-14 flex-shrink-0">価格（円）</span>
                <input type="number" placeholder="例: 680" value={shopItemModal.price} onChange={(e) => setShopItemModal(prev => ({ ...prev, price: e.target.value }))} className="flex-1 px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-xs font-mono text-gray-800" />
              </div>
            ) : (
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-gray-500 w-14 flex-shrink-0">消費倍率</span>
                <input type="number" step="0.5" min="0.5" placeholder="例: 2" value={shopItemModal.multiplier} onChange={(e) => setShopItemModal(prev => ({ ...prev, multiplier: e.target.value }))} className="flex-1 px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-xs font-mono text-gray-800" />
                <span className="text-xs text-gray-400 flex-shrink-0">倍 / 時</span>
              </div>
            )}
            <input type="text" placeholder="説明文（任意）" value={shopItemModal.description} onChange={(e) => setShopItemModal(prev => ({ ...prev, description: e.target.value }))} className="w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-xs text-gray-600" />
            <div className="flex gap-2 pt-1">
              {shopItemModal.id && (
                <button onClick={() => { handleDeleteShopItem(shopItemModal.id, shopItemModal.name); setShopItemModal({ isOpen: false, ...EMPTY_SHOP_ITEM }); }} className="px-4 py-3 rounded-xl bg-red-50 text-red-500 font-bold text-xs border border-red-100 hover:bg-red-100 transition-all">削除</button>
              )}
              <button onClick={handleSaveShopItem} className={`flex-1 py-3 rounded-xl font-black text-sm text-white shadow-md transition-all active:scale-95 ${shopItemModal.type === "real" ? "bg-emerald-500 hover:bg-emerald-600" : "bg-purple-500 hover:bg-purple-600"}`}>
                {shopItemModal.id ? "保存する" : "追加する"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* モーニングレシートモーダル */}
      {morningModal.isOpen && (
        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
          <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <div className="text-center mb-5">
              <div className="text-4xl mb-2">🌅</div>
              <h3 className="font-black text-xl text-gray-800">おはようございます</h3>
              <p className="text-xs text-gray-500 mt-1">昨日の睡眠を記録して、レシートを発行します</p>
            </div>
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">就寝時刻</label>
                  <input type="time" value={morningModal.bedTime}
                    onChange={(e) => setMorningModal(prev => ({ ...prev, bedTime: e.target.value }))}
                    className="w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-sm font-mono text-center" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5">起床時刻</label>
                  <input type="time" value={morningModal.wakeTime}
                    onChange={(e) => setMorningModal(prev => ({ ...prev, wakeTime: e.target.value }))}
                    className="w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none text-sm font-mono text-center" />
                </div>
              </div>
              {/* 睡眠の質4択 */}
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5">昨夜の睡眠の質は？</label>
                <div className="grid grid-cols-4 gap-1.5">
                  {[
                    { key: "great", emoji: "😴", label: "ぐっすり", mult: "×1.1", color: "border-emerald-400 bg-emerald-50 text-emerald-700" },
                    { key: "ok",    emoji: "😊", label: "まあまあ", mult: "×1.0", color: "border-blue-400 bg-blue-50 text-blue-700" },
                    { key: "poor",  emoji: "😪", label: "浅かった", mult: "×0.9", color: "border-orange-400 bg-orange-50 text-orange-700" },
                    { key: "bad",   emoji: "💀", label: "最悪",     mult: "×0.7", color: "border-red-400 bg-red-50 text-red-700" },
                  ].map(opt => (
                    <button key={opt.key}
                      onClick={() => setMorningModal(prev => ({ ...prev, sleepQuality: opt.key }))}
                      className={`py-2 rounded-xl text-[10px] font-bold border-2 transition-all ${morningModal.sleepQuality === opt.key ? opt.color + " shadow-md" : "bg-gray-50 text-gray-500 border-gray-200"}`}>
                      <div className="text-lg mb-0.5">{opt.emoji}</div>
                      <div>{opt.label}</div>
                      <div className="font-mono">{opt.mult}</div>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5">起床〜アプリ起動までの時間は？</label>
                <div className="grid grid-cols-3 gap-2">
                  {[
                    { key: "investment", label: "投資", emoji: "📚" },
                    { key: "recovery",   label: "回復", emoji: "🛀" },
                    { key: "waste",      label: "浪費", emoji: "📱" },
                  ].map(opt => (
                    <button key={opt.key}
                      onClick={() => setMorningModal(prev => ({ ...prev, gapCategory: opt.key }))}
                      className={`py-2.5 rounded-xl text-xs font-bold border-2 transition-all ${
                        morningModal.gapCategory === opt.key
                          ? getCategoryTheme(opt.key).bg + " text-white border-transparent shadow-md"
                          : "bg-gray-50 text-gray-600 border-gray-100 hover:bg-gray-100"
                      }`}>
                      <div className="text-lg mb-0.5">{opt.emoji}</div>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <button onClick={handleMorningConfirm}
              className="w-full mt-5 py-3.5 rounded-2xl bg-emerald-500 hover:bg-emerald-600 text-white font-black text-sm shadow-lg transition-colors">
              昨日のレシートを見る →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
